# SonarQube project configuration

sonar.projectKey=nwg-drawer
sonar.projectName=nwg-drawer
sonar.projectVersion=0.3.0

# Source code location — standalone repo has src/ at root
sonar.sources=src

# Test sources must be set BEFORE sonar.test.inclusions — listing both `src`
# and `tests` means inline `#[cfg(test)] mod tests` and any Cargo integration
# tests under top-level tests/ are both discoverable.
sonar.tests=src,tests

# Rust source files
sonar.inclusions=**/*.rs

# Exclude non-source files
sonar.exclusions=**/target/**

# Test file pattern — any file under a tests/ directory at any depth.
sonar.test.inclusions=**/tests/**

# Encoding
sonar.sourceEncoding=UTF-8
